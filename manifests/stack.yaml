# prvis Infrastructure Stack
# Loaded into all LLM contexts at boot.
# Describes the physical and logical infrastructure Aria operates within.

platform:
  name: prvis
  version: "1.0.0-beta"
  description: >
    prvis is a commercial autonomous security agent platform. It provides
    security operations (SOC), GRC, vulnerability management, MDM, and
    security architecture capabilities through AI-driven agents.

deployment:
  hypervisor:
    product: Proxmox VE
    version: "9.1.1"
    host: host2
    ip: 192.168.1.220
    api: https://192.168.1.220:8006
    node: host2

  network:
    subnet: 192.168.1.0/24
    gateway: 192.168.1.1
    dns: 192.168.1.11 (prvis-dns, PowerDNS)
    tailscale: enabled on host2 (100.99.186.117)

  vms:
    - vmid: 101
      name: alpha-ai
      ip: 192.168.1.9
      role: LLM inference server (Ollama)
      gpu: 16GB VRAM
      ram: 32GB
      models: [qwen3:30b-a3b, qwen3:8b, phi3:mini, devstral-small-2]

    - vmid: 102
      name: prvis-ai
      ip: 192.168.1.16
      role: Aria platform host (this system)
      ram: 32GB
      services: [aria-api, aria-worker, aria-executor, kafka, redis, qdrant]

    - vmid: 103
      name: prvis-dns
      ip: 192.168.1.11
      role: DNS server (PowerDNS)

    - vmid: 104
      name: prvis-core
      ip: 192.168.1.21
      role: prvis core services (pending deployment)
      status: created, SSH not yet configured

  remote_machines:
    - name: Alienware (vikas-alien-1)
      tailscale_ip: 100.66.170.90
      role: Gamma LLM inference
      gpu: 8GB VRAM (RTX mobile)
      ram: 64GB
      models: [qwen3:14b, qwen3:30b, qwen2.5-coder:14b]

  storage:
    proxmox_storage: local-lvm
    base_image: /var/lib/vz/template/iso/noble-server-cloudimg-amd64.img
    knowledge_volume: aria-knowledge (mounted at /knowledge in ingestion container)

services:
  running_on_prvis_ai:
    - aria-api          # thin API — auth + Kafka enqueue
    - aria-worker       # Alpha + inline Gamma — planning
    - aria-executor     # Beta — step execution
    - aria-activity     # Kafka consumer → Redis writer
    - kafka             # KRaft single node message bus
    - aria-redis        # task results, activity, CCF cache
    - aria-qdrant       # vector store for RAG
    - aria-mem0         # memory layer
    - aria-mcp-servers  # security tool MCP server
    - aria-ingestion    # document ingestion with inotify watcher
    - aria-web          # Next.js frontend (port 3002)
    - aria-openhands    # code execution agent (port 3001)
    - aria-notify       # notification service

repositories:
  - name: prvis-aria
    url: https://github.com/mbmjsuperuser7/prvis-aria
    description: Main Aria platform
  - name: prvis-ai-training
    url: https://github.com/mbmjsuperuser7/prvis-ai-training
    description: Alpha model fine-tuning data and scripts
  - name: prvis-aes (renamed to prvis-arc)
    url: https://github.com/mbmjsuperuser7/prvis-aes
    description: prvis Arc — security architecture engagement platform
