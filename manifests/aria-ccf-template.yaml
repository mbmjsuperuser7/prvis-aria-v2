# Aria-CCF — User Context File Template
# One file per user, stored at users/{user_id}/aria-ccf.yaml
# Loaded at invocation (instant, from disk).
# Updated every 4 hours by background thread — new signals appended, never rewritten.
# Never stores data not already available in connected platform connectors.
# Gamma validates that no private signals leak to user conversation.

user:
  id: "{user_id}"
  name: "{display_name}"
  role: "{role}"
  designation: "{designation}"
  tenant: "{tenant_id}"
  timezone: "{timezone}"

interaction_profile:
  # Observed over time — updated by session summariser
  preferred_style: direct  # direct / detailed / exploratory
  response_length: concise  # concise / standard / detailed
  technical_depth: high  # low / medium / high
  known_frustrations: []  # patterns that frustrate this user
  known_preferences: []   # things this user explicitly likes

availability_signals:
  # Derived from calendar connector — operational signals only
  # Private event details (medical, personal) are NEVER stored
  # Only the availability impact is recorded
  current_status: available  # available / reduced / away
  last_seen: null
  absence_periods: []  # [{start, end, reason: "away"}] — reason is always generic

recent_context:
  # Updated every 4 hours from connected platform connectors
  # Summarised signals — not raw data
  last_updated: null
  platform_summary: null  # e.g. "3 open P1 alerts, 2 new critical findings"
  last_session_summary: null  # what was worked on last time
  pending_items: []  # things left incomplete from last session

session_history:
  # Rolling summary of last N sessions — compressed over time
  # Full session details stored separately in users/{id}/sessions/
  recent_sessions: []

greeting_context:
  # Used to personalise the opening greeting
  # Aria generates greeting from this — never scripted
  returning_after_absence: false
  absence_duration_days: 0
  has_pending_items: false
  platform_has_new_alerts: false
